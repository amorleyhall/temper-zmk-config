layout: {zmk_keyboard: temper}
layers:
  default:
  - - B
    - L
    - D
    - C
    - V
    - J
    - F
    - O
    - U
    - {t: ',', s: <}
  - [N, R, T, S, G, Y, H, A, E, I]
  - - X
    - Q
    - M
    - W
    - Z
    - K
    - P
    - {t: '''', s: '"'}
    - {t: ;, s: ':'}
    - {t: ., s: '>'}
  - - symbol
    - nav
    - SPACE
    - {t: RSHIFT, h: sticky}
    - num
    - fun
  qwerty:
  - [Q, W, E, R, T, Y, U, I, O, P]
  - - A
    - S
    - D
    - F
    - G
    - H
    - J
    - K
    - L
    - {t: ;, s: ':'}
  - - Z
    - X
    - C
    - V
    - B
    - N
    - M
    - {t: ',', s: <}
    - {t: ., s: '>'}
    - \
  - - symbol
    - nav
    - SPACE
    - {t: RSHIFT, h: sticky}
    - num
    - fun
  symbol:
  - ['~', <, '[', (, '{', '}', ), ']', '>', '"']
  - - '!'
    - '@'
    - '#'
    - $
    - '%'
    - ^
    - '&'
    - '*'
    - {t: '-', s: _}
    - {t: '''', s: '"'}
  - - {t: '`', s: '~'}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - /
    - {t: ▽, type: trans}
    - '?'
    - \
    - ⌃
    - _
    - '|'
  - - {t: ESC, type: held}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  num:
  - - /
    - '7'
    - '8'
    - '9'
    - {t: '-', s: _}
    - {t: ▽, type: trans}
    - BSPC
    - {t: ▽, type: trans}
    - DEL
    - {t: ▽, type: trans}
  - - '*'
    - '4'
    - '5'
    - '6'
    - +
    - {t: ▽, type: trans}
    - ⇧
    - ⌃
    - ⌘
    - ⎇
  - - {t: ., s: '>'}
    - '1'
    - '2'
    - '3'
    - {t: '=', s: +}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  - - {t: ▽, type: trans}
    - '0'
    - SPACE
    - {t: ▽, type: trans}
    - {type: held}
    - {t: ▽, type: trans}
  nav:
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - '&msc SCRL_UP'
    - PAGE UP
    - HOME
    - {t: ▽, type: trans}
  - - {t: ⎇, h: sticky}
    - {t: ⌘, h: sticky}
    - {t: ⌃, h: sticky}
    - {t: ⇧, h: sticky}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - ←
    - ↑
    - ↓
    - →
  - - ⎇
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - '&msc SCRL_DOWN'
    - PAGE DOWN
    - END
    - {t: ▽, type: trans}
  - - {t: ▽, type: trans}
    - {type: held}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  fun:
  - - {t: ▽, type: trans}
    - F7
    - F8
    - F9
    - F12
    - {t: ▽, type: trans}
    - MUTE
    - VOL DN
    - VOL UP
    - {t: ▽, type: trans}
  - - {t: ▽, type: trans}
    - F4
    - F5
    - F6
    - F11
    - {t: BT, h: '0'}
    - {t: BT, h: '1'}
    - {t: BT, h: '2'}
    - {t: BT, h: '3'}
    - {t: BT, h: '4'}
  - - {t: ▽, type: trans}
    - F1
    - F2
    - F3
    - F10
    - {t: ▽, type: trans}
    - PREV
    - PP
    - NEXT
    - BT CLR
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {type: held}
  cmd:
  - - ⌘Q
    - ⌘W
    - F
    - Gui+P
    - B
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  - - ⇧
    - ⌃
    - ⎇
    - ⌘
    - Gui+G
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  - - ⌘Z
    - ⌘X
    - ⌘C
    - D
    - ⌘V
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
combos:
- p: [1, 2]
  k: ESC
- p: [6, 7]
  k: BSPC
- p: [7, 8]
  k: DEL
- p: [21, 22]
  k: ↹
- p: [27, 28]
  k: RET
- p: [11, 12]
  k: ⇪
- p: [1, 2, 3]
  k: {t: num, h: toggle}
- p: [6, 7, 8]
  k: {t: qwerty, h: toggle}
